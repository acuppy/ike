name: QuadrantTimer
options:
  bundleIdPrefix: com.adamcuppy
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_NAME: QuadrantTimer
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Sources/QuadrantTimer/Info.plist
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_ENTITLEMENTS: Sources/QuadrantTimer/QuadrantTimer.entitlements
    ENABLE_HARDENED_RUNTIME: YES
    DEVELOPMENT_TEAM: ""

targets:
  QuadrantTimer:
    type: application
    platform: macOS
    sources:
      - path: Sources/QuadrantTimer
        excludes:
          - "Info.plist"
          - "*.entitlements"
    # No `info:` block — INFOPLIST_FILE points at the hand-maintained plist
    # so xcodegen leaves it alone (custom URL scheme lives there).
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adamcuppy.QuadrantTimer
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
    dependencies:
      - package: KeyboardShortcuts
